name: Build Multi-Platform

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          # macOS ARM (M1/M2/M3/M4/M5)
          - os: macos-latest
            pyinstaller_args: --onefile --windowed --name CommDebugTool --add-data resources:resources --hidden-import comm.tcp_client --hidden-import comm.tcp_server --hidden-import comm.udp_comm --hidden-import comm.serial_comm --hidden-import comm.websocket_comm --hidden-import comm.mqtt_comm --hidden-import packet.checksum --hidden-import packet.packet_builder --hidden-import protocols --hidden-import ui --hidden-import utils
            plat_dir: macos-arm64
            artifact_name: CommDebugTool-macos-arm64
            ext: ""

          # macOS Intel (x86_64)
          - os: macos-13
            pyinstaller_args: --onefile --windowed --name CommDebugTool --add-data resources:resources --hidden-import comm.tcp_client --hidden-import comm.tcp_server --hidden-import comm.udp_comm --hidden-import comm.serial_comm --hidden-import comm.websocket_comm --hidden-import comm.mqtt_comm --hidden-import packet.checksum --hidden-import packet.packet_builder --hidden-import protocols --hidden-import ui --hidden-import utils
            plat_dir: macos-x86_64
            artifact_name: CommDebugTool-macos-x86_64
            ext: ""

          # Windows x64
          - os: windows-latest
            pyinstaller_args: --onefile --windowed --name CommDebugTool --add-data "resources;resources" --hidden-import comm.tcp_client --hidden-import comm.tcp_server --hidden-import comm.udp_comm --hidden-import comm.serial_comm --hidden-import comm.websocket_comm --hidden-import comm.mqtt_comm --hidden-import packet.checksum --hidden-import packet.packet_builder --hidden-import protocols --hidden-import ui --hidden-import utils
            plat_dir: windows-x64
            artifact_name: CommDebugTool-windows-x64
            ext: .exe

          # Windows x86 (32-bit)
          - os: windows-2019
            pyinstaller_args: --onefile --windowed --name CommDebugTool --add-data "resources;resources" --hidden-import comm.tcp_client --hidden-import comm.tcp_server --hidden-import comm.udp_comm --hidden-import comm.serial_comm --hidden-import comm.websocket_comm --hidden-import comm.mqtt_comm --hidden-import packet.checksum --hidden-import packet.packet_builder --hidden-import protocols --hidden-import ui --hidden-import utils
            plat_dir: windows-x86
            artifact_name: CommDebugTool-windows-x86
            ext: .exe

          # Linux x86_64
          - os: ubuntu-latest
            pyinstaller_args: --onefile --windowed --name CommDebugTool --add-data resources:resources --hidden-import comm.tcp_client --hidden-import comm.tcp_server --hidden-import comm.udp_comm --hidden-import comm.serial_comm --hidden-import comm.websocket_comm --hidden-import comm.mqtt_comm --hidden-import packet.checksum --hidden-import packet.packet_builder --hidden-import protocols --hidden-import ui --hidden-import utils
            plat_dir: linux-x86_64
            artifact_name: CommDebugTool-linux-x86_64
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pyserial

      - name: Copy icon for macOS
        if: runner.os == 'macOS'
        run: |
          if [ -f resources/app_icon.icns ]; then
            EXTRA="--icon resources/app_icon.icns"
          fi
          echo "EXTRA=$EXTRA" >> $GITHUB_ENV

      - name: Build executable
        run: |
          python -m PyInstaller ${{ matrix.pyinstaller_args }} ${{ env.EXTRA }} main.py --distpath dist/${{ matrix.plat_dir }} --workpath build/${{ matrix.plat_dir }}

      - name: Package (macOS - create .app.zip for OTA)
        if: runner.os == 'macOS'
        run: |
          BINARY="dist/${{ matrix.plat_dir }}/CommDebugTool"
          if [ -f "$BINARY" ]; then
            mkdir -p dist/_tmp/CommDebugTool.app/Contents/MacOS
            mkdir -p dist/_tmp/CommDebugTool.app/Contents/Resources
            cp "$BINARY" dist/_tmp/CommDebugTool.app/Contents/MacOS/CommDebugTool
            chmod +x dist/_tmp/CommDebugTool.app/Contents/MacOS/CommDebugTool
            if [ -f resources/app_icon.icns ]; then
              cp resources/app_icon.icns dist/_tmp/CommDebugTool.app/Contents/Resources/
            fi
            cat > dist/_tmp/CommDebugTool.app/Contents/Info.plist << EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0"><dict>
<key>CFBundleExecutable</key><string>CommDebugTool</string>
<key>CFBundleIdentifier</key><string>com.commdebugtool.app</string>
<key>CFBundleName</key><string>CommDebugTool</string>
<key>CFBundleIconFile</key><string>app_icon.icns</string>
<key>CFBundlePackageType</key><string>APPL</string>
<key>LSUIElement</key><true/>
</dict></plist>
EOF
            cd dist/_tmp
            zip -r "../${{ matrix.artifact_name }}.zip" CommDebugTool.app
            cd ../..
            rm -rf dist/_tmp
          fi

      - name: Package (Windows - zip)
        if: runner.os == 'Windows'
        run: |
          cd dist
          tar -acf "${{ matrix.artifact_name }}.zip" "${{ matrix.plat_dir }}"
          cd ..

      - name: Package (Linux - tar.gz)
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar -czf "${{ matrix.artifact_name }}.tar.gz" "${{ matrix.plat_dir }}"
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.*
          retention-days: 30
