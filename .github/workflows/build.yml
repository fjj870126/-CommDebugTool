name: Build Multi-Platform

on:
  # Manual trigger - one click in GitHub Actions tab
  workflow_dispatch:
  # Auto trigger on version tags
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: macos
            artifact: CommDebugTool-macos
          - os: windows-latest
            platform: windows
            artifact: CommDebugTool-windows
          - os: ubuntu-latest
            platform: linux
            artifact: CommDebugTool-linux

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller pyserial

      - name: Detect architecture (Unix)
        if: runner.os != 'Windows'
        run: |
          ARCH=$(uname -m)
          echo "ARCH=$ARCH" >> $GITHUB_ENV
          echo "PLATFORM_DIR=${{ matrix.platform }}-${ARCH}" >> $GITHUB_ENV

      - name: Detect architecture (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          if "%PROCESSOR_ARCHITECTURE%"=="AMD64" (
            echo ARCH=x64>> %GITHUB_ENV%
            echo PLATFORM_DIR=windows-x64>> %GITHUB_ENV%
          ) else if "%PROCESSOR_ARCHITECTURE%"=="ARM64" (
            echo ARCH=arm64>> %GITHUB_ENV%
            echo PLATFORM_DIR=windows-arm64>> %GITHUB_ENV%
          ) else (
            echo ARCH=x86>> %GITHUB_ENV%
            echo PLATFORM_DIR=windows-x86>> %GITHUB_ENV%
          )

      - name: Build executable
        run: |
          python -m PyInstaller CommDebugTool.spec --noconfirm --distpath "dist/${{ env.PLATFORM_DIR }}" --workpath "build/${{ env.PLATFORM_DIR }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ env.ARCH }}
          path: dist/${{ env.PLATFORM_DIR }}/
          retention-days: 30

  # Create release when triggered by a version tag
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package artifacts
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            zip -r "../${name}.zip" "$dir"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
